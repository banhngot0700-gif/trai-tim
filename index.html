<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heart</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    height:100vh;
}

/* canvas */

canvas{
    position:absolute;
    top:0;
    left:0;
}

</style>
</head>

<body>

<canvas id="heart"></canvas>

<script>

const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

/* công thức trái tim */

function heart(t){

    let x = 16 * Math.pow(Math.sin(t),3);

    let y =
        13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

    return{
        x:x,
        y:-y
    };
}

/* particle */

class Particle{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.size = Math.random()*3 + 1;

        this.alpha = 1;

        this.speedX = (Math.random()-0.5)*2;
        this.speedY = (Math.random()-0.5)*2;
    }

    update(){

        this.x += this.speedX;
        this.y += this.speedY;

        this.alpha -= 0.01;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.alpha;

        ctx.fillStyle = "#ff003c";

        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ff003c";

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.restore();
    }
}

/* tạo trái tim */

function createHeart(){

    for(let t=0; t<Math.PI*2; t+=0.08){

        let pos = heart(t);

        let x =
            canvas.width/2 + pos.x * 20;

        let y =
            canvas.height/2 + pos.y * 20;

        particles.push(
            new Particle(x,y)
        );
    }
}

/* animation */

function animate(){

    ctx.fillStyle = "rgba(0,0,0,0.12)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    createHeart();

    for(let i=0; i<particles.length; i++){

        particles[i].update();

        particles[i].draw();

        if(particles[i].alpha <= 0){

            particles.splice(i,1);

            i--;
        }
    }

    requestAnimationFrame(animate);
}

animate();

/* resize */

window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;

    canvas.height = window.innerHeight;

});

</script>

</body>
</html>
